name: 'Apply latest configuration to Fleet'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  fleet-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4

      - name: Apply latest configuration to Fleet
        uses: ./.github/gitops-action
        with:
          dry-run-only: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        env:
          FLEET_API_TOKEN: ${{ secrets.FLEET_API_TOKEN }}
          FLEET_URL: ${{ secrets.FLEET_URL }}
          FLEET_GLOBAL_ENROLL_SECRET: ${{ secrets.FLEET_GLOBAL_ENROLL_SECRET }}
          FLEET_WORKSTATIONS_ENROLL_SECRET: ${{ secrets.FLEET_WORKSTATIONS_ENROLL_SECRET }}
          FLEET_GENERAL_ENROLL_SECRET: ${{ secrets.FLEET_GENERAL_ENROLL_SECRET }}
          FLEET_MOBILE_DEVICES_ENROLL_SECRET: ${{ secrets.FLEET_MOBILE_DEVICES_ENROLL_SECRET }}
          FLEET_MDM_SSO_METADATA: ${{ secrets.FLEET_MDM_SSO_METADATA }}
          FLEET_S3_SOFTWARE_INSTALLERS_ACCESS_KEY_ID: ${{ secrets.FLEET_S3_SOFTWARE_INSTALLERS_ACCESS_KEY_ID }}
          FLEET_S3_SOFTWARE_INSTALLERS_SECRET_ACCESS_KEY: ${{ secrets.FLEET_S3_SOFTWARE_INSTALLERS_SECRET_ACCESS_KEY }}
          FLEET_S3_SOFTWARE_INSTALLERS_ENDPOINT_URL: https://storage.googleapis.com
          FLEET_S3_SOFTWARE_INSTALLERS_BUCKET: helios-fleet-installers-2024
          FLEET_S3_SOFTWARE_INSTALLERS_FORCE_S3_PATH_STYLE: "true"
          FLEET_S3_SOFTWARE_INSTALLERS_REGION: us-central1
