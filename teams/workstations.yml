name: Workstations
policies:
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that 1Password is installed.
  name: '[Install software] 1Password'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.1password.1password';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that Google Chrome is installed.
  name: '[Install software] Google Chrome'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.google.Chrome';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that Slack is installed.
  name: '[Install software] Slack'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.tinyspeck.slackmacgap';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that Postman is installed.
  name: '[Install software] Postman'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.postmanlabs.mac';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that Microsoft Word is installed.
  name: '[Install software] Microsoft Word'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.microsoft.Word';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that Linear is installed.
  name: '[Install software] Linear'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.linear';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that Cursor is installed.
  name: '[Install software] Cursor'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.todesktop.230313mzl4w4u92';
queries:
agent_options:
controls:
  enable_disk_encryption: true
  macos_updates:
    deadline: "2026-04-01"
    minimum_version: "15.3"
  scripts:
software:
  # TODO: Re-enable fleet_maintained_apps and install_software policy
  # automations after resolving S3/GCS credential access from the GitHub
  # Actions runner. fleetctl verifies packages in the S3-compatible store
  # (GCS) client-side, which needs HMAC credentials available to the
  # runner's AWS SDK. See github.com/fleetdm/fleet/issues/40303
  fleet_maintained_apps:
  packages:
team_settings:
  secrets:
  - secret: $FLEET_WORKSTATIONS_ENROLL_SECRET
