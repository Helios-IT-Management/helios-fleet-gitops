- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy triggers automatic install of Microsoft Word on each host that's
    missing this software.
  install_software:
    hash_sha256: cfe42ce805a9f082a55a1f16bc4c69e8b9aa8626e0555b27540fb0985e4b3fdd
      # Microsoft Word (Microsoft_Word_16.102.25110228_Installer.pkg) version 16.102.3
  name: '[Install software] Microsoft Word'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.microsoft.Word';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy triggers automatic install of Docker Desktop on each host that's
    missing this software.
  install_software:
    hash_sha256: 79f6b379d7c4558ae4dcb3bf42d78c8ffa78bc1089194808c747696855c9129c
      # Docker (Docker.dmg) version 4.49.0
  name: '[Install software] Docker Desktop'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.docker.docker';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy triggers automatic install of Linear on each host that's missing
    this software.
  install_software:
    hash_sha256: 3989bf97d625424fa15cb5adb9f3e068e31f066cdb17474633005e8ecdc8f054
      # Linear (Linear 1.28.6 - Build 251002av7g3go28-arm64-mac.zip) version 1.28.6
  name: '[Install software] Linear'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.linear';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy triggers automatic install of Cursor on each host that's missing
    this software.
  install_software:
    hash_sha256: 2772ae955bb7b5b3d33c002f8b544f7499a3e00047c5111e8cdeab8c2a883327
      # Cursor (Cursor-darwin-arm64.zip) version 2.0.60
  name: '[Install software] Cursor'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.todesktop.230313mzl4w4u92';
queries:
agent_options:
controls:
  enable_disk_encryption: true
  macos_updates:
    minimum_version: "15.3"
  scripts:
software:
  fleet_maintained_apps:
  - categories:
    - Browsers
    install_script:
      path: ../lib/macos/scripts/google-chrome-darwin-install
    self_service: true
    setup_experience: true
    slug: google-chrome/darwin
  - categories:
    - Communication
    install_script:
      path: ../lib/macos/scripts/slack-darwin-install
    self_service: true
    setup_experience: true
    slug: slack/darwin
  - categories:
    - Developer tools
    install_script:
      path: ../lib/macos/scripts/cursor-darwin-install
    self_service: true
    slug: cursor/darwin
  - categories:
    - Developer tools
    install_script:
      path: ../lib/macos/scripts/linear-darwin-install
    self_service: true
    slug: linear-linear/darwin
  - categories:
    - Developer tools
    install_script:
      path: ../lib/macos/scripts/postman-darwin-install
    self_service: true
    setup_experience: true
    slug: postman/darwin
  - categories:
    - Productivity
    install_script:
      path: ../lib/macos/scripts/1password-darwin-install
    self_service: true
    setup_experience: true
    slug: 1password/darwin
  - categories:
    - Productivity
    install_script:
      path: ../lib/macos/scripts/microsoft-word-darwin-install
    self_service: true
    slug: microsoft-word/darwin
  packages:
  - categories:
    - Developer tools
    hash_sha256: 79f6b379d7c4558ae4dcb3bf42d78c8ffa78bc1089194808c747696855c9129c
      # Docker (Docker.dmg) version 4.49.0
    install_script:
      path: ../lib/macos/scripts/docker-darwin-install
    self_service: true
    uninstall_script:
      path: ../lib/macos/scripts/docker-darwin-uninstall
    url: https://desktop.docker.com/mac/main/arm64/208700/Docker.dmg
team_settings:
  secrets:
  - secret: $FLEET_WORKSTATIONS_ENROLL_SECRET
