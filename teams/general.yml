name: General
policies:
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy checks that 1Password is installed.
  name: '[Install software] 1Password'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.1password.1password';
  resolution: Open Fleet Desktop and install the latest 1Password from Self-service.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy checks that Google Chrome is installed.
  name: '[Install software] Google Chrome'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.google.Chrome';
  resolution: Open Fleet Desktop and install the latest Google Chrome from Self-service.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy checks that Slack is installed.
  name: '[Install software] Slack'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.tinyspeck.slackmacgap';
  resolution: Open Fleet Desktop and install the latest Slack from Self-service.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy checks that Microsoft Word is installed.
  name: '[Install software] Microsoft Word'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.microsoft.Word';
  resolution: Open Fleet Desktop and install the latest Microsoft Word from Self-service.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: true
  description: Policy checks that CrowdStrike Falcon is installed.
  install_software:
    hash_sha256: 8fb2a90cdda97e9ea14d65751ff46d8e1a4dda1b37986078443ce7fe1d9c6f4c
  name: '[Install software] Falcon Notifications (pkg)'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.crowdstrike.falcon.UserAgent';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: true
  description: Verifies that FileVault disk encryption is enabled.
  name: Disk encryption enabled (FileVault)
  platform: darwin
  query: SELECT 1 FROM filevault_status WHERE status = 'FileVault is On.';
  resolution: Contact IT to enable FileVault on this device.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Verifies that the screen lock configuration profile is applied.
  name: Screen lock enabled
  platform: darwin
  query: SELECT 1 FROM managed_policies WHERE domain = 'com.apple.screensaver' AND name = 'askForPassword' AND value = '1';
  resolution: Contact IT -- the screen lock profile may not be installed.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: true
  description: Checks that the macOS firewall is enabled.
  name: Firewall enabled
  platform: darwin
  query: SELECT 1 FROM alf WHERE global_state >= 1;
  resolution: Enable the firewall in System Settings > Network > Firewall.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: true
  description: Checks that Gatekeeper is enabled to ensure only trusted software can run.
  name: Gatekeeper enabled
  platform: darwin
  query: SELECT 1 FROM gatekeeper WHERE assessments_enabled = 1;
  resolution: Enable Gatekeeper in System Settings > Privacy & Security.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: true
  description: Checks that System Integrity Protection (SIP) is enabled.
  name: System Integrity Protection enabled
  platform: darwin
  query: SELECT 1 FROM sip_config WHERE config_flag = 'sip' AND enabled = 1;
  resolution: Boot to Recovery Mode and run csrutil enable.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that automatic software update checking is enabled via MDM.
  name: Automatic updates enabled
  platform: darwin
  query: SELECT 1 FROM managed_policies WHERE domain='com.apple.SoftwareUpdate' AND name='AutomaticCheckEnabled' AND value=1 LIMIT 1;
  resolution: Contact IT -- the automatic updates configuration profile may not be installed.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Verifies that all SSH keys on the device are encrypted with a passphrase.
  name: SSH keys encrypted
  platform: darwin
  query: SELECT 1 WHERE NOT EXISTS (SELECT 1 FROM users CROSS JOIN user_ssh_keys USING (uid) WHERE encrypted='0');
  resolution: Re-generate SSH keys with a passphrase using ssh-keygen -p.
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Checks that Homebrew is installed.
  name: '[Install software] Homebrew'
  platform: darwin
  query: SELECT 1 FROM file WHERE path = '/opt/homebrew/bin/brew' OR path = '/usr/local/bin/brew';
  resolution: Homebrew will be installed automatically.
  run_script:
    path: ../lib/macos/scripts/homebrew-darwin-install
queries:
agent_options:
controls:
  enable_disk_encryption: true
  macos_updates:
    deadline: "2026-04-01"
    minimum_version: "15.3"
  macos_settings:
    custom_settings:
      - path: ../lib/macos/configuration-profiles/crowdstrike-full-disk-access.mobileconfig
      - path: ../lib/macos/configuration-profiles/crowdstrike-system-extension.mobileconfig
      - path: ../lib/macos/configuration-profiles/crowdstrike-web-filter.mobileconfig
      - path: ../lib/macos/configuration-profiles/crowdstrike-notification.mobileconfig
      - path: ../lib/macos/configuration-profiles/crowdstrike-service-management.mobileconfig
      - path: ../lib/macos/configuration-profiles/screenlock.mobileconfig
      - path: ../lib/macos/configuration-profiles/software-update.mobileconfig
      - path: ../lib/macos/configuration-profiles/firewall.mobileconfig
  scripts:
    - path: ../lib/macos/scripts/homebrew-darwin-install
