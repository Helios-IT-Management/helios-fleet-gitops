name: General
policies:
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy checks that 1Password is installed.
  name: '[Install software] 1Password'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.1password.1password';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy checks that Google Chrome is installed.
  name: '[Install software] Google Chrome'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.google.Chrome';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy checks that Slack is installed.
  name: '[Install software] Slack'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.tinyspeck.slackmacgap';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: false
  description: Policy checks that Microsoft Word is installed.
  name: '[Install software] Microsoft Word'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.microsoft.Word';
- calendar_events_enabled: false
  conditional_access_enabled: false
  critical: true
  description: Policy checks that CrowdStrike Falcon is installed.
  install_software:
    hash_sha256: 8fb2a90cdda97e9ea14d65751ff46d8e1a4dda1b37986078443ce7fe1d9c6f4c
  name: '[Install software] Falcon Notifications (pkg)'
  platform: darwin
  query: SELECT 1 FROM apps WHERE bundle_identifier = 'com.crowdstrike.falcon.UserAgent';
queries:
agent_options:
controls:
  enable_disk_encryption: true
  macos_updates:
    deadline: "2026-04-01"
    minimum_version: "15.3"
  macos_settings:
    custom_settings:
      - path: ../lib/macos/configuration-profiles/crowdstrike-full-disk-access.mobileconfig
      - path: ../lib/macos/configuration-profiles/crowdstrike-system-extension.mobileconfig
      - path: ../lib/macos/configuration-profiles/crowdstrike-web-filter.mobileconfig
      - path: ../lib/macos/configuration-profiles/crowdstrike-notification.mobileconfig
      - path: ../lib/macos/configuration-profiles/crowdstrike-service-management.mobileconfig
  scripts:
software:
  fleet_maintained_apps:
  - categories:
    - Browsers
    install_script:
      path: ../lib/macos/scripts/google-chrome-darwin-install
    self_service: true
    setup_experience: true
    slug: google-chrome/darwin
  - categories:
    - Communication
    install_script:
      path: ../lib/macos/scripts/slack-darwin-install
    self_service: true
    setup_experience: true
    slug: slack/darwin
  - categories:
    - Productivity
    install_script:
      path: ../lib/macos/scripts/1password-darwin-install
    self_service: true
    setup_experience: true
    slug: 1password/darwin
  - categories:
    - Productivity
    install_script:
      path: ../lib/macos/scripts/microsoft-word-darwin-install
    self_service: true
    slug: microsoft-word/darwin
  - categories:
    - Productivity
    self_service: true
    slug: microsoft-excel/darwin
  - categories:
    - Productivity
    self_service: true
    slug: microsoft-onenote/darwin
  - categories:
    - Productivity
    self_service: true
    slug: microsoft-outlook/darwin
  - categories:
    - Productivity
    self_service: true
    slug: microsoft-powerpoint/darwin
  - categories:
    - Design
    self_service: true
    slug: figma/darwin
  - categories:
    - Productivity
    self_service: true
    slug: google-drive/darwin
  - categories:
    - Productivity
    self_service: true
    slug: drawio/darwin
  - categories:
    - Utilities
    self_service: true
    slug: stats/darwin
  - categories:
    - Developer tools
    self_service: true
    slug: linear-linear/darwin
  packages:
  - hash_sha256: 8fb2a90cdda97e9ea14d65751ff46d8e1a4dda1b37986078443ce7fe1d9c6f4c
    post_install_script:
      path: ../lib/macos/scripts/crowdstrike-falcon-darwin-install-post
    self_service: false
team_settings:
  secrets:
  - secret: $FLEET_GENERAL_ENROLL_SECRET
